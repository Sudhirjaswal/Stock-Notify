name: StockSentry — Cloud Stock Checker

on:
  # Run every 15 minutes (GitHub's minimum cron interval)
  schedule:
    - cron: '*/15 * * * *'

  # Allow manual trigger from the Actions tab for testing
  workflow_dispatch:

jobs:
  check-stock:
    name: Check Stock & Notify
    runs-on: ubuntu-latest

    # Allow the job to commit state.json back to the repo
    permissions:
      contents: write

    steps:
      # ── 1. Checkout the repo ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Pull latest (includes any recent state.json updates)
          fetch-depth: 1

      # ── 2. Setup Python ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: cloud-checker/requirements.txt

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r cloud-checker/requirements.txt

      # ── 4. Run the stock checker ────────────────────────────────────────────
      - name: Run StockSentry Checker
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python cloud-checker/checker.py

      # ── 5. Commit updated state.json back to repo ───────────────────────────
      #       [skip ci] prevents this commit from triggering another run
      - name: Save state to repository
        run: |
          git config --local user.email "stocksentry-bot@github.com"
          git config --local user.name  "StockSentry Bot"
          git add cloud-checker/state.json
          git diff --staged --quiet || git commit -m "chore: update stock state [skip ci]"
          git push
